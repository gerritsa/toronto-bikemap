name: Monthly data refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "17 7 5 * *"

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run pipeline and publish to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          PUBLIC_DATA_BASE_URL: ${{ secrets.PUBLIC_DATA_BASE_URL }}
          PREVIOUS_MANIFEST_URL: ${{ secrets.PUBLIC_DATA_BASE_URL }}/manifest/latest.json
          OSRM_URL: ${{ secrets.OSRM_URL }}
          OSRM_PROFILE: bicycle
          PYTHONPATH: pipeline
        run: >
          python -m bikeshare_pipeline.run
          --work-dir pipeline/work
          --output-dir pipeline/output
          --publish
          --allow-fallback-routes
